<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond transparent -->
  <rect width="400" height="200" fill="none"/>
  
  <!-- Corps principal de l'ambulance -->
  <rect x="50" y="80" width="280" height="80" fill="#ffffff" stroke="#1e40af" stroke-width="3" rx="8"/>
  
  <!-- Cabine conducteur -->
  <rect x="50" y="60" width="80" height="100" fill="#ffffff" stroke="#1e40af" stroke-width="3" rx="8"/>
  
  <!-- Partie arrière surélevée -->
  <rect x="280" y="70" width="50" height="90" fill="#ffffff" stroke="#1e40af" stroke-width="3" rx="6"/>
  
  <!-- Pare-brise -->
  <rect x="55" y="65" width="70" height="35" fill="#e0f2fe" stroke="#1e40af" stroke-width="2" rx="4"/>
  
  <!-- Fenêtres latérales -->
  <rect x="140" y="85" width="40" height="25" fill="#e0f2fe" stroke="#1e40af" stroke-width="2" rx="3"/>
  <rect x="190" y="85" width="40" height="25" fill="#e0f2fe" stroke="#1e40af" stroke-width="2" rx="3"/>
  <rect x="240" y="85" width="30" height="25" fill="#e0f2fe" stroke="#1e40af" stroke-width="2" rx="3"/>
  
  <!-- Porte arrière -->
  <rect x="285" y="85" width="40" height="50" fill="#f8fafc" stroke="#1e40af" stroke-width="2" rx="3"/>
  <circle cx="305" cy="110" r="3" fill="#1e40af"/>
  
  <!-- Roues -->
  <circle cx="85" cy="170" r="18" fill="#374151" stroke="#1e40af" stroke-width="3"/>
  <circle cx="85" cy="170" r="10" fill="#6b7280"/>
  <circle cx="285" cy="170" r="18" fill="#374151" stroke="#1e40af" stroke-width="3"/>
  <circle cx="285" cy="170" r="10" fill="#6b7280"/>
  
  <!-- Croix rouge sur le côté -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="15" fill="#dc2626"/>
    <rect x="-8" y="-3" width="16" height="6" fill="#ffffff" rx="1"/>
    <rect x="-3" y="-8" width="6" height="16" fill="#ffffff" rx="1"/>
  </g>
  
  <!-- Croix rouge à l'arrière -->
  <g transform="translate(305, 105)">
    <circle cx="0" cy="0" r="8" fill="#dc2626"/>
    <rect x="-4" y="-1.5" width="8" height="3" fill="#ffffff" rx="0.5"/>
    <rect x="-1.5" y="-4" width="3" height="8" fill="#ffffff" rx="0.5"/>
  </g>
  
  <!-- Gyrophare -->
  <ellipse cx="165" cy="55" rx="12" ry="6" fill="#dc2626" opacity="0.8"/>
  <ellipse cx="165" cy="55" rx="8" ry="4" fill="#fca5a5"/>
  
  <!-- Phares avant -->
  <circle cx="45" cy="100" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="45" cy="125" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Feux arrière -->
  <circle cx="335" cy="100" r="6" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <circle cx="335" cy="120" r="6" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Texte AMBULANCE (en miroir) -->
  <text x="200" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af" transform="scale(-1,1) translate(-400,0)">
    AMBULANCE
  </text>
  
  <!-- Détails décoratifs -->
  <line x1="50" y1="140" x2="330" y2="140" stroke="#1e40af" stroke-width="2"/>
  <line x1="50" y1="145" x2="330" y2="145" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  
  <!-- Ombre portée -->
  <ellipse cx="185" cy="190" rx="140" ry="8" fill="#000000" opacity="0.1"/>
</svg>